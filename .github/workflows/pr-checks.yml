name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  # ============================================
  # PR Title Validation
  # ============================================
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject must not start with an uppercase letter.

  # ============================================
  # PR Size Check
  # ============================================
  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count changed lines
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --stat origin/${{ github.base_ref }} | tail -1)
          echo "Changed: $CHANGED"
          
          # Extract numbers
          INSERTIONS=$(echo $CHANGED | grep -oP '\d+(?= insertion)' || echo "0")
          DELETIONS=$(echo $CHANGED | grep -oP '\d+(?= deletion)' || echo "0")
          TOTAL=$((INSERTIONS + DELETIONS))
          
          echo "Total lines changed: $TOTAL"
          
          if [ $TOTAL -gt 500 ]; then
            echo "::warning::PR is large ($TOTAL lines). Consider splitting into smaller PRs."
          fi
