version: "3.8"

services:
  persona-agent:
    build:
      context: .
    container_name: persona-agent
    ports:
      - "8080:8080"
    volumes:
      - ./memory:/app/memory
      - ./config:/app/config
    environment:
      - PERSONA_AGENT_API_KEY=${PERSONA_AGENT_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
